<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Add Cash - UPI Gateway</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #22c55e; --dark: #0f172a; --card-bg: #1e293b; --gold: #ffd700; }
        body { font-family: 'Poppins', sans-serif; background: var(--dark); color: white; margin: 0; padding: 15px; }
        
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        .back-btn { font-size: 20px; cursor: pointer; color: var(--primary); }

        .amt-card { background: var(--card-bg); padding: 25px; border-radius: 15px; border: 1px solid #334155; text-align: center; }
        .amt-input-wrapper { position: relative; margin-bottom: 20px; }
        .currency-symbol { position: absolute; left: 15px; top: 12px; font-size: 24px; color: var(--gold); font-weight: bold; }
        
        input#customAmt { width: 100%; padding: 15px 15px 15px 40px; border-radius: 10px; border: 2px solid #334155; background: #0f172a; color: white; font-size: 24px; font-weight: bold; box-sizing: border-box; }
        
        .amt-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .amt-opt { background: #0f172a; border: 1px solid #334155; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 14px; }
        .amt-opt.active { border-color: var(--primary); background: rgba(34, 197, 94, 0.1); color: var(--primary); }

        .btn-proceed { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-proceed i { font-size: 20px; }
        
        .loader-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 5000; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="loader-overlay" id="loader">
        <i class="fas fa-spinner fa-spin fa-3x" style="color: var(--primary); margin-bottom: 15px;"></i>
        <p>Connecting to UPI Gateway...</p>
    </div>

    <div class="header">
        <i class="fas fa-arrow-left back-btn" onclick="history.back()"></i>
        <h3 style="margin:0;">Add Cash to Wallet</h3>
    </div>

    <div class="amt-card">
        <p style="color: #94a3b8; font-size: 14px; margin-bottom: 15px;">Enter amount to generate UPI QR</p>
        
        <div class="amt-input-wrapper">
            <span class="currency-symbol">₹</span>
            <input type="number" id="customAmt" value="100" min="10">
        </div>
        
        <div class="amt-grid">
            <div class="amt-opt" onclick="setAmt(50, this)">₹50</div>
            <div class="amt-opt active" onclick="setAmt(100, this)">₹100</div>
            <div class="amt-opt" onclick="setAmt(500, this)">₹500</div>
        </div>

        <button class="btn-proceed" id="payBtn" onclick="payWithUPIGateway()">
            <i class="fas fa-qrcode"></i> GENERATE DYNAMIC QR
        </button>
        
        <p style="margin-top: 20px; font-size: 11px; color: #64748b;">
            <i class="fas fa-lock"></i> Secured UPI Payment Gateway
        </p>
    </div>

    <script>
        const BACKEND_URL = "https://khel-bhai-luso-backend-service.onrender.com";

        function setAmt(val, element) {
            document.getElementById('customAmt').value = val;
            document.querySelectorAll('.amt-opt').forEach(opt => opt.classList.remove('active'));
            element.classList.add('active');
        }

        async function payWithUPIGateway() {
            const amount = document.getElementById('customAmt').value;
            const userId = localStorage.getItem('userId');
            const btn = document.getElementById('payBtn');
            const loader = document.getElementById('loader');

            if (!userId) return alert("Login session expired. Please login again.");
            if (!amount || amount < 10) return alert("Min. ₹10 required");

            try {
                btn.disabled = true;
                loader.style.display = 'flex';

                const res = await fetch(`${BACKEND_URL}/api/pay/create-order`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amount, userId })
                });
                
                const data = await res.json();

                if (data.success && data.payment_data && data.payment_data.payment_url) {
                    window.location.href = data.payment_data.payment_url;
                } else {
                    alert("Payment Error: " + (data.error || "Gateway busy hai, thodi der baad koshish karein"));
                    loader.style.display = 'none';
                    btn.disabled = false;
                }
            } catch (err) {
                console.error("Fetch Error:", err);
                alert("Server connect nahi ho raha hai.");
                loader.style.display = 'none';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
