<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ludo Platform</title>
    
    <style>
        :root { --primary: #d32f2f; --gold: #ffd700; --dark-bg: #1a1a1a; --card-bg: #2c2c2c; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: var(--dark-bg); color: white; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        .app-container { width: 100%; max-width: 450px; height: 100%; background: var(--card-bg); position: relative; padding: 25px; box-sizing: border-box; text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .logo { font-size: 38px; font-weight: 800; color: var(--gold); margin-bottom: 40px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        
        input { width: 100%; padding: 14px; margin: 12px 0; border-radius: 10px; border: 1px solid #444; background: #333; color: white; font-size: 16px; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: var(--gold); outline: none; background: #444; }
        
        button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        button:disabled { background: #555; cursor: not-allowed; }
        button:active { transform: scale(0.98); }
        
        .link-text { color: var(--gold); font-size: 14px; margin-top: 20px; cursor: pointer; text-decoration: none; display: inline-block; }
        .link-text:hover { text-decoration: underline; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; overflow-y: auto; }
        .modal-content { padding: 30px 20px; text-align: left; max-width: 400px; margin: auto; }
        .modal-content h3 { color: var(--gold); border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 20px; }
        .file-label { font-size: 13px; color: #bbb; margin-top: 10px; display: block; }
    </style>
</head>
<body>

<div class="app-container" id="loginPage">
    <div class="logo">Khel Bhai Ludo</div>
    
    <!-- 🔥 FIXED FLOW: PASSWORD BASED SECURE LOGIN INTERFACE -->
    <div id="mobileSection">
        <input type="number" id="loginMobile" placeholder="Enter Mobile Number" maxlength="10">
        <input type="password" id="loginPassword" placeholder="Enter Password">
        <button id="loginWithPassBtn" onclick="loginWithPassword()">Login</button>
        <div class="link-text" onclick="toggleModal('forgotModal', true)" style="margin-top: 15px; font-size: 13px; color: #aaa;">Forgot Password?</div>
    </div>

    <!-- Hidden fallback trace interface keeping old setup alive -->
    <div id="otpSection" style="display: none;">
        <p style="color: var(--gold); font-size: 14px;">OTP aapke mobile par bhej diya gaya hai.</p>
        <input type="number" id="loginOTP" placeholder="Enter 4-Digit OTP" maxlength="4">
        <button id="verifyBtn" onclick="verifyFast2SMS_Login()">Login via OTP</button>
        <div class="link-text" onclick="location.reload()" style="margin-top: 10px; color: #aaa;">Back to Mobile</div>
    </div>

    <div class="link-text" onclick="toggleModal('regModal', true)">New User? Register Here</div>
</div>

<!-- 📩 DYNAMIC FORGOT PASSWORD EMAIL INPUT MODAL -->
<div id="forgotModal" class="modal">
    <div class="modal-content">
        <h3>Recover Account Password</h3>
        <p style="color: #bbb; font-size: 13px; margin-bottom: 15px;">Registered Email Address daalein, aapki mail par temporary password bhej diya jayega.</p>
        <input type="email" id="forgotEmail" placeholder="Enter Registered Email">
        <button id="forgotSubmitBtn" onclick="submitForgotPassword()">Send Default Password</button>
        <button style="background:#444; margin-top:10px;" onclick="toggleModal('forgotModal', false)">Cancel</button>
    </div>
</div>

<div id="regModal" class="modal">
    <div class="modal-content">
        <h3>Create New Account</h3>
        <input type="text" id="regName" placeholder="Full Name">
        <input type="email" id="regEmail" placeholder="Email Address">
        <input type="number" id="regMobile" placeholder="Mobile Number">
        <input type="text" id="regUser" placeholder="Choose Username">
        <input type="password" id="regPass" placeholder="Set Password">
        
        <button id="regBtn" onclick="submitRegistration()">Save & Register</button>
        <button style="background:#444; margin-top:10px;" onclick="toggleModal('regModal', false)">Cancel</button>
    </div>
</div>

<script>
    const API_BASE = "https://khelbhailudo.onrender.com/api";

    // Variable to hold refer id from URL parameters globally
    let globalReferBy = null;

    function toggleModal(id, show) {
        document.getElementById(id).style.display = show ? 'block' : 'none';
    }

    // Capture referral ID as soon as window loads
    window.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const refId = urlParams.get('ref');
        if(refId) {
            globalReferBy = parseInt(refId);
            console.log("Captured Referral ID:", globalReferBy);
        }
    });

// 🔥 NEW CLIENT CONTROLLER: PASSWORD VALIDATION BASED DIRECT ACCESS
async function loginWithPassword() {
    const mobile = document.getElementById('loginMobile').value.trim();
    const password = document.getElementById('loginPassword').value.trim();
    const btn = document.getElementById('loginWithPassBtn');

    if(!mobile || !password) return alert("Kripya Mobile Number aur Password dono daalein!");
    if(mobile.length < 10) return alert("Sahi 10-digit mobile number daalein!");

    btn.disabled = true;
    btn.innerText = "Logging in...";

    try {
        const response = await fetch(`${API_BASE}/auth/login-with-password`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ mobile, password })
        });

        const data = await response.json();

        if (data.success) {
            localStorage.setItem('userId', data.userId);
            window.location.href = data.termsAccepted ? "dashboard.html" : "term.html";
        } else {
            alert("Error: " + data.error);
        }
    } catch (error) {
        console.error(error);
        alert("Server validation interaction failure.");
    } finally {
        btn.disabled = false;
        btn.innerText = "Login";
    }
}

// 🔥 NEW CLIENT CONTROLLER: RECOVER DEFAULT CREDS VIA NODEMAILER ROUTE
async function submitForgotPassword() {
    const email = document.getElementById('forgotEmail').value.trim();
    const btn = document.getElementById('forgotSubmitBtn');

    if(!email) return alert("Kripya apni Email Address daalein!");

    btn.disabled = true;
    btn.innerText = "Sending Password...";

    try {
        const response = await fetch(`${API_BASE}/auth/forgot-password`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
        });

        const data = await response.json();

        if (data.success) {
            alert("📩 SUCCESS!\nAapke registered Email ID par default login password bhej diya gaya hai. Inbox check karein.");
            toggleModal('forgotModal', false);
            document.getElementById('forgotEmail').value = '';
        } else {
            alert("Error: " + data.error);
        }
    } catch (error) {
        console.error(error);
        alert("Failed to compile cloud recovery routing.");
    } finally {
        btn.disabled = false;
        btn.innerText = "Send Default Password";
    }
}

// 1. FAST2SMS REQUEST OTP (LIVE SMS MODE) - Retained for system integrity
async function requestFast2SMS_OTP() {
    const mobile = document.getElementById('loginMobile').value.trim();
    const btn = document.getElementById('otpReqBtn');

    if(mobile.length < 10) return alert("Sahi 10-digit mobile number daalein!");

    btn.disabled = true;
    btn.innerText = "Sending OTP...";

    try {
        const response = await fetch(`${API_BASE}/auth/send-otp`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ mobile: mobile })
        });

        const data = await response.json();

        if (data.success) {
            alert("📩 OTP aapke mobile number par safely bhej diya gaya hai. Kripya check karein.");
            document.getElementById('mobileSection').style.display = 'none';
            document.getElementById('otpSection').style.display = 'block';
        } else {
            alert("Error: " + data.error);
            btn.disabled = false;
            btn.innerText = "Send OTP";
        }
    } catch (error) {
        console.error(error);
        alert("Server connection failed during OTP routing.");
        btn.disabled = false;
        btn.innerText = "Send OTP";
    }
}

// 2. FAST2SMS VERIFY & DIRECT PAYLOAD LOGIN - Retained for system integrity
async function verifyFast2SMS_Login() {
    const otp = document.getElementById('loginOTP').value.trim();
    const mobile = document.getElementById('loginMobile').value.trim();
    const btn = document.getElementById('verifyBtn');

    if(!otp) return alert("Kripya OTP daalein!");

    btn.disabled = true;
    btn.innerText = "Verifying...";

    try {
        const response = await fetch(`${API_BASE}/auth/verify-otp`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ mobile: mobile, otp: otp })
        });

        const data = await response.json();

        if(data.success) {
            localStorage.setItem('userId', data.userId);
            window.location.href = data.termsAccepted ? "dashboard.html" : "term.html";
        } else {
            alert(data.error || "Galat OTP! Kripya check karein.");
            btn.disabled = false;
            btn.innerText = "Login";
        }
    } catch (error) {
        console.error(error);
        alert("Network connection failure during transaction compilation.");
        btn.disabled = false;
        btn.innerText = "Login";
    }
}

    // --- REGISTRATION LOGIC WITH REFER SYSTEM ---
    async function submitRegistration() {
        const btn = document.getElementById('regBtn');
        
        const fullName = document.getElementById('regName').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const mobile = document.getElementById('regMobile').value.trim();
        const username = document.getElementById('regUser').value.trim();
        const password = document.getElementById('regPass').value.trim();

        if(!fullName || !email || !mobile || !username || !password) {
            return alert("Kripya saari details bharein!");
        }

        try {
            btn.disabled = true;
            btn.innerText = "Registering...";

            const response = await fetch(`${API_BASE}/register`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json' 
                },
                body: JSON.stringify({ 
                    fullName: fullName, 
                    email: email, 
                    mobile: mobile, 
                    username: username, 
                    password: password, 
                    referred_by: globalReferBy 
                })
            });
            
            const result = await response.json();
            if (result.success) {
                alert("Registration successful! Khelna shuru karein.");
                toggleModal('regModal', false);
            } else { 
                alert("Error: " + result.error); 
            }
        } catch (error) { 
            alert("Server connection failed during registration."); 
        } finally { 
            btn.disabled = false; 
            btn.innerText = "Save & Register"; 
        }
    }
</script>
</body>
</html>
