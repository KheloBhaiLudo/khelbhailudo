<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ludo Platform</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>

    <style>
        :root { --primary: #d32f2f; --gold: #ffd700; --dark-bg: #1a1a1a; --card-bg: #2c2c2c; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: var(--dark-bg); color: white; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        .app-container { width: 100%; max-width: 450px; height: 100%; background: var(--card-bg); position: relative; padding: 25px; box-sizing: border-box; text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .logo { font-size: 38px; font-weight: 800; color: var(--gold); margin-bottom: 40px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        
        input { width: 100%; padding: 14px; margin: 12px 0; border-radius: 10px; border: 1px solid #444; background: #333; color: white; font-size: 16px; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: var(--gold); outline: none; background: #444; }
        
        button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        button:disabled { background: #555; cursor: not-allowed; }
        button:active { transform: scale(0.98); }
        
        .link-text { color: var(--gold); font-size: 14px; margin-top: 20px; cursor: pointer; text-decoration: none; display: inline-block; }
        .link-text:hover { text-decoration: underline; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; overflow-y: auto; }
        .modal-content { padding: 30px 20px; text-align: left; max-width: 400px; margin: auto; }
        .modal-content h3 { color: var(--gold); border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 20px; }
        .file-label { font-size: 13px; color: #bbb; margin-top: 10px; display: block; }

        /* Recaptcha hidden placeholder */
        #recaptcha-container { margin-top: 10px; }
    </style>
</head>
<body>

<div class="app-container" id="loginPage">
    <div class="logo">Khelo Bhai Ludo</div>
    
    <div id="mobileSection">
        <input type="number" id="loginMobile" placeholder="Enter Mobile Number" maxlength="10">
        <div id="recaptcha-container"></div>
        <button id="otpReqBtn" onclick="requestFirebaseOTP()">Send OTP</button>
    </div>

    <div id="otpSection" style="display: none;">
        <p style="color: var(--gold); font-size: 14px;">OTP aapke mobile par bhej diya gaya hai.</p>
        <input type="number" id="loginOTP" placeholder="Enter 6-Digit OTP" maxlength="6">
        <button id="verifyBtn" onclick="verifyFirebaseLogin()">Login</button>
        <div class="link-text" onclick="location.reload()" style="margin-top: 10px; color: #aaa;">Back to Mobile</div>
    </div>

    <div class="link-text" onclick="toggleModal('regModal', true)">New User? Register Here</div>
</div>

<div id="regModal" class="modal">
    <div class="modal-content">
        <h3>Create New Account</h3>
        <input type="text" id="regName" placeholder="Full Name (as per Aadhaar)">
        <input type="email" id="regEmail" placeholder="Email Address">
        <input type="number" id="regMobile" placeholder="Mobile Number">
        <input type="text" id="regUser" placeholder="Choose Username">
        <input type="password" id="regPass" placeholder="Set Password">
        
        <span class="file-label">Aadhaar Front Side:</span>
        <input type="file" id="aadhaarFront" accept="image/*">
        
        <span class="file-label">Aadhaar Back Side:</span>
        <input type="file" id="aadhaarBack" accept="image/*">
        
        <button id="regBtn" onclick="submitRegistration()">Save & Register</button>
        <button style="background:#444; margin-top:10px;" onclick="toggleModal('regModal', false)">Cancel</button>
    </div>
</div>

<script>
    // --- 2. FIREBASE INITIALIZATION ---
    const firebaseConfig = {
      apiKey: "AIzaSyDVVYZdaumn8eF_7uLwGYQfiYPFBk-g74s",
      authDomain: "khel-bhai-ludo-3c152.firebaseapp.com",
      projectId: "khel-bhai-ludo-3c152",
      storageBucket: "khel-bhai-ludo-3c152.firebasestorage.app",
      messagingSenderId: "89832698030",
      appId: "1:89832698030:web:edf4792ab7467655f7fd3f",
      measurementId: "G-BXZEE5MX5G"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Variable to hold refer id from URL parameters globally
    let globalReferBy = null;

    function toggleModal(id, show) {
        document.getElementById(id).style.display = show ? 'block' : 'none';
    }

    // Capture referral ID as soon as window loads
    window.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const refId = urlParams.get('ref');
        if(refId) {
            globalReferBy = parseInt(refId);
            console.log("Captured Referral ID:", globalReferBy);
        }
    });

    // FIREBASE REQUEST OTP
    async function requestFirebaseOTP() {
        const mobile = document.getElementById('loginMobile').value;
        const btn = document.getElementById('otpReqBtn');

        if(mobile.length < 10) return alert("Sahi 10-digit mobile number daalein!");

        // Recaptcha setup (Invisible)
        window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
            'size': 'invisible'
        });

        const phoneNumber = "+91" + mobile;
        btn.disabled = true;
        btn.innerText = "Sending SMS...";

        auth.signInWithPhoneNumber(phoneNumber, window.recaptchaVerifier)
            .then((confirmationResult) => {
                window.confirmationResult = confirmationResult;
                document.getElementById('mobileSection').style.display = 'none';
                document.getElementById('otpSection').style.display = 'block';
            }).catch((error) => {
                console.error(error);
                alert("Error: " + error.message);
                btn.disabled = false;
                btn.innerText = "Send OTP";
            });
    }

    // FIREBASE VERIFY LOGIN
    async function verifyFirebaseLogin() {
        const otp = document.getElementById('loginOTP').value;
        const mobile = document.getElementById('loginMobile').value;
        const btn = document.getElementById('verifyBtn');

        btn.disabled = true;
        btn.innerText = "Verifying...";

        confirmationResult.confirm(otp)
            .then(async (result) => {
                // OTP SUCCESS! Ab backend ko batao
                const response = await fetch('https://khel-bhai-luso-backend-service.onrender.com/api/verify-login-firebase', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ mobile: mobile })
                });

                const data = await response.json();
                if(data.success) {
                    localStorage.setItem('userId', data.userId);
                    window.location.href = data.termsAccepted ? "dashboard.html" : "term.html";
                } else {
                    alert(data.error);
                    btn.disabled = false;
                    btn.innerText = "Login";
                }
            }).catch((error) => {
                alert("Galat OTP! Kripya check karein.");
                btn.disabled = false;
                btn.innerText = "Login";
            });
    }

    // --- REGISTRATION LOGIC WITH REFER SYSTEM ---
async function submitRegistration() {
    const btn = document.getElementById('regBtn');
    
    // Strict Input Element Targeting Layer
    const frontInput = document.getElementById('aadhaarFront');
    const backInput = document.getElementById('aadhaarBack');
    
    const frontFile = frontInput && frontInput.files ? frontInput.files[0] : null;
    const backFile = backInput && backInput.files ? backInput.files[0] : null;

    const fullName = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const mobile = document.getElementById('regMobile').value.trim();
    const username = document.getElementById('regUser').value.trim();
    const password = document.getElementById('regPass').value.trim();

    if(!fullName || !email || !mobile || !username || !password) {
        return alert("Kripya saari details bharein!");
    }
    if(!frontFile || !backFile) {
        return alert("Aadhaar card ke dono sides upload karna anivarya hai!");
    }

    const formData = new FormData();
    formData.append('fullName', fullName);
    formData.append('email', email);
    formData.append('mobile', mobile);
    formData.append('username', username);
    formData.append('password', password);
    formData.append('aadharFront', frontFile);
    formData.append('aadharBack', backFile);
    
    if(globalReferBy) {
        formData.append('referred_by', globalReferBy);
    }

    try {
        btn.disabled = true;
        btn.innerText = "Registering & Uploading...";
        
        const response = await fetch('https://khel-bhai-luso-backend-service.onrender.com/api/register', {
            method: 'POST',
            body: formData // Content-Type header mat lagana, browser automatic boundary set karega
        });
        
        const result = await response.json();
        if (result.success) {
            alert("Registration successful! Documents safely uploaded. Admin approval ka wait karein.");
            toggleModal('regModal', false);
            // Form reset logic
            if(frontInput) frontInput.value = '';
            if(backInput) backInput.value = '';
        } else { 
            alert("Error: " + result.error); 
        }
    } catch (error) { 
        alert("Server connection failed during dynamic upload."); 
    } finally { 
        btn.disabled = false; 
        btn.innerText = "Save & Register"; 
    }
}
</script>
</body>
</html>
