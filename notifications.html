<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Notifications - Ludo Empire</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #00d2ff; --secondary: #3a7bd5; --dark: #0f172a; --accent: #ffd700; --card-bg: #1e293b; --green: #22c55e; }
        body { font-family: 'Poppins', sans-serif; background: radial-gradient(circle at top, #1e293b, #0f172a); color: white; margin: 0; padding: 0; min-height: 100vh; }

        /* Header */
        .header {
            display: flex; align-items: center; gap: 15px; padding: 15px 20px;
            background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .header i { font-size: 20px; cursor: pointer; color: var(--primary); }
        .header h3 { margin: 0; font-size: 18px; letter-spacing: 0.5px; }

        /* Notification List Wrapper */
        .notif-container { padding: 20px 15px; }

        /* Card Design */
        .notif-card {
            background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(8px);
            border-radius: 16px; padding: 18px; margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex; gap: 15px; position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: 0.3s ease;
        }
        .notif-card:active { transform: scale(0.98); background: rgba(30, 41, 59, 0.8); }

        .notif-icon-box {
            width: 45px; height: 45px; background: linear-gradient(135deg, #3b82f6, #00d2ff);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            color: white; font-size: 20px; flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(0, 210, 255, 0.3);
        }

        .notif-content { flex-grow: 1; }
        .notif-title { font-size: 15px; font-weight: bold; color: #f1f5f9; margin: 0 0 5px 0; }
        .notif-message { font-size: 13px; color: #cbd5e1; margin: 0; line-height: 1.5; word-break: break-word; }
        
        .notif-time { 
            font-size: 10px; color: #64748b; margin-top: 8px; 
            display: flex; align-items: center; gap: 4px; font-weight: 500;
        }

        /* Empty State */
        .no-data { text-align: center; padding: 100px 20px; color: #64748b; }
        .no-data i { font-size: 50px; margin-bottom: 15px; color: #334155; }
        .no-data p { margin: 0; font-size: 15px; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-arrow-left" onclick="history.back()"></i>
        <h3>Notifications</h3>
    </div>

    <div class="notif-container" id="notifList">
        <p style="text-align:center; color:#64748b;">Loading announcements...</p>
    </div>

    <script>
        const API_BASE = "https://khelbhailudo.onrender.com/api";

        window.onload = () => {
            fetchUserNotifications();
        };

        async function fetchUserNotifications() {
            const listDiv = document.getElementById('notifList');
            try {
                const res = await fetch(`${API_BASE}/notifications`);
                if(!res.ok) throw new Error("API failed");
                const data = await res.json();

                if(!data || data.length === 0) {
                    listDiv.innerHTML = `
                        <div class="no-data">
                            <i class="fas fa-bell-slash"></i>
                            <p>Abhi koi naya update ya notice nahi hai.</p>
                        </div>`;
                    return;
                }

                listDiv.innerHTML = data.map(n => {
                    const timeString = n.created_at ? new Date(n.created_at).toLocaleString([], {hour: '2-digit', minute:'2-digit', day: 'numeric', month: 'short'}) : 'Just Now';
                    return `
                        <div class="notif-card">
                            <div class="notif-icon-box">
                                <i class="fas fa-bullhorn"></i>
                            </div>
                            <div class="notif-content">
                                <h4 class="notif-title">${n.title}</h4>
                                <p class="notif-message">${n.message}</p>
                                <div class="notif-time">
                                    <i class="far fa-clock"></i> ${timeString}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

            } catch (err) {
                console.error(err);
                listDiv.innerHTML = '<p style="text-align:center; color:#ef4444; padding:20px;">Failed to refresh notifications.</p>';
            }
        }
    </script>
</body>
</html>
