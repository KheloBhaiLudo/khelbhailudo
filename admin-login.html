<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Ludo Master</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #1e293b; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; width: 300px; border: 1px solid #d32f2f; }
        h2 { color: #d32f2f; }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #d32f2f; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Master Admin</h2>
        <input type="password" id="adminPass" placeholder="Enter Admin Password">
        <button onclick="loginAdmin()">LOGIN</button>
    </div>

    <script>
async function loginAdmin() {
    const password = document.getElementById('adminPass').value;
    try {
const res = await fetch('https://khelbhailudo.onrender.com/api/admin/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password })
});
        
        // Agar route nahi mila toh alert dikhaye
        if (res.status === 404) {
            return alert("Error: Backend mein login route missing hai! Server deploy karein.");
        }

        const data = await res.json();
        if(data.success) {
            localStorage.setItem('admin_logged_in', 'true');
            window.location.href = "admin-pannel.html";
        } else {
            alert("Galat Password!");
        }
    } catch (err) {
        alert("Server se connect nahi ho pa raha hai.");
    }
}
    </script>
</body>
</html>
